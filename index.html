<script>
let localizacaoTecnico = null;

// Estruturas para gerenciar o estado temporário das fotos por contrato

let fotoFachada = {};       // { "contratoId": base64 }
let statusAtendimento = {}; // { "contratoId": "PRODUTIVO" | "IMPRODUTIVO" }

// --- CONTROLE DE PAGINAÇÃO GLOBAL ---

let contratosCarregadosTemporarios = []; // Armazena os contratos carregados da busca original

// Estados adicionais para Reversão no Histórico Local

let fotoFachadaReversao = {};          // { contratoId: 'base64' }
let statusReversao = {};               // { contratoId: 'PRODUTIVO' | 'IMPRODUTIVO' }
let equipamentosContratoReversao = {}; // { contratoId: [ 'equipamento1', 'equipamento2' ] }

// Variáveis Globais de Controle de Ciclo do Leaflet
let mapaBacklogInstance = null;
let markersGroup = null;

// --- GESTÃO DE LOGIN E AUTENTICAÇÃO ---
async function validarAcesso(login, isAutoLogin = false) {
    const btnEntrar = document.getElementById('btn-login-entrar');
    if (btnEntrar) {
        btnEntrar.disabled = true;
        btnEntrar.textContent = "VALIDANDO CREDENCIAIS...";
    }

    try {
        const response = await fetch('/api/validarTecnico', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login: login })
        });

        if (response.ok) {
            const data = await response.json();
            
            if (data.status === 'ATIVO') {
                // Guarda sessão
                localStorage.setItem('login_tecnico', login);
                document.getElementById('input-tecnico').value = login;
                
                // Aplica regra de restrição territorial de cidade [2]
                const inputCidade = document.getElementById('input-cidade');
                if (data.cidadeAtuacao && data.cidadeAtuacao !== 'TODAS') {
                    inputCidade.value = data.cidadeAtuacao;
                    inputCidade.disabled = true; // Trava o campo para evitar desvios [2]
                    inputCidade.style.background = '#1e293b';
                    inputCidade.style.color = '#94a3b8';
                    inputCidade.style.cursor = 'not-allowed';
                } else {
                    // Libera campo para busca livre caso tenha acesso total [2]
                    inputCidade.disabled = false;
                    inputCidade.style.background = '#0f172a';
                    inputCidade.style.color = 'white';
                    inputCidade.style.cursor = 'text';
                    if (!inputCidade.value) inputCidade.value = "";
                }

                exibirLogin(false);
            } else if (data.status === 'BLOQUEADO') {
                alert("Seu acesso foi bloqueado pelo administrador.");
                efetuarLogout();
            } else {
                alert("Usuário não cadastrado.");
                efetuarLogout();
            }
        } else {
            alert("Erro ao conectar com o serviço de validação.");
            if (isAutoLogin) exibirLogin(true);
        }
    } catch (e) {
        console.error(e);
        alert("Falha de rede ao tentar autenticar.");
        if (isAutoLogin) exibirLogin(true);
    } finally {
        if (btnEntrar) {
            btnEntrar.disabled = false;
            btnEntrar.textContent = "ENTRAR NO SISTEMA";
        }
    }
}

function exibirLogin(mostrar) {
    const overlay = document.getElementById('login-overlay');
    if (mostrar) {
        overlay.style.display = 'flex';
    } else {
        overlay.style.display = 'none';
    }
}

function efetuarLogin() {
    const login = document.getElementById('login-usuario').value.trim().toLowerCase();
    if (!login) {
        alert("Por favor, digite seu login único.");
        return;
    }
    validarAcesso(login, false);
}

function efetuarLogout() {
    localStorage.removeItem('login_tecnico');
    document.getElementById('login-usuario').value = "";
    document.getElementById('input-tecnico').value = "";
    document.getElementById('input-cidade').value = "";
    exibirLogin(true);
}

// --- GEOLOCALIZAÇÃO ---
function obterGeolocalizacao() {
    return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
            reject("Sem suporte a GPS");
            return;
        }
        navigator.geolocation.getCurrentPosition(
            position => resolve(position.coords),
            error => reject(error),
            { enableHighAccuracy: true, timeout: 10000 }
        );
    });
}

// --- FÓRMULA DE HAVERSINE ---
function calcularDistanciaKm(lat1, lon1, lat2, lon2) {
    const R = 6371; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = 
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
        Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
}

// --- AUXILIAR DE DELAY ---
function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// --- HIGIENIZADOR CIRÚRGICO DE ENDEREÇOS COM TRADUÇÃO DE SIGLAS DE TELEFONIA ---
function limparEnderecoParaGeocodificacao(endereco) {
    if (!endereco) return "";
    let limpo = address => address.toUpperCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Remove acentos
        
        // 1. Remove qualquer texto explicativo/bairro entre parênteses
        .replace(/\s*\([^)]*\)/g, "")
        
        // 2. EXPANSÃO DE SIGLAS DE TELEFONIA (Garante que o Nominatim encontre os logradouros)
        .replace(/\bV\b/g, "VIA")                       // V -> VIA (ex: V AGUINALDO)
        .replace(/\bCD\b/g, "CONDE")                     // CD -> CONDE (ex: R CD ZEPELIN)
        .replace(/\bSTOS\b/g, "SANTOS")                  // STOS -> SANTOS
        .replace(/\bPRES\b/g, "PRESIDENTE")              // PRES -> PRESIDENTE
        .replace(/\bSTO\b/g, "SANTO")
        .replace(/\bSTA\b/g, "SANTA")
        .replace(/^R\b/g, "RUA")                        // R -> RUA (no início)
        .replace(/^AV\b/g, "AVENIDA")                    // AV -> AVENIDA (no início)
        
        // 3. REMOÇÃO DE COMPLEMENTOS AMPLIADA: Remove termos e qualquer informação após eles no final
        // Limpa com precisão "CASA FRENTE", "FD 2", "FD", "CASA FUNDOS", "FUNDO", "FT", "BL 3", "F1", "F2", "BL 1000", etc.
        .replace(/\s*\b(CASA|FUNDO|FUNDOS|FD|FDS|FTE|FT|F\d+|FRENTE|SOBRADO|TERREO|ALTOS|APTO|APT|AP|BLOCO|BL|SALA|SL|LOJA|LJ|PAV|PAVIMENTO|ANDAR)\b.*$/gi, "")
        
        // 4. Remove siglas de quadra e lote de forma limpa
        .replace(/\b(QD|QUADRA)\s*\d*\b/gi, "")
        .replace(/\b(LT|LOTE)\s*\d*\b/gi, "")
        
        // 5. Normaliza hifens órfãos seguidos do número do imóvel (ex: "790 - F1" -> "790")
        .replace(/\s*-\s*(\d+)/g, " $1")
        .replace(/\s*-\s*$/g, "") // Remove hífen órfão no final
        
        // 6. Limpa sobras de pontuação e espaços múltiplos
        .replace(/,\s*,/g, ",")
        .replace(/,\s*$/g, "")
        .replace(/\s+/g, " ")
        .trim();
    return limpo(endereco);
}

// --- NORMALIZADOR DE ENTRADA DE CIDADE (SEM ACENTOS E MAIÚSCULAS) ---
function normalizarInputCidade(val) {
    if (!val) return "";
    return val.normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "")
              .replace(/[^a-zA-Z\s]/g, "")
              .toUpperCase()
              .trim();
}

// --- NORMALIZADOR DE COMPARAÇÃO DE BAIRROS ---
function normalizarBairro(b) {
    if (!b) return "";
    return b.normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "") // Remove acentos
            .toUpperCase()
            .replace(/\bJD\b/g, "JARDIM") // Normaliza abreviações
            .replace(/\bVILAS\b/g, "VILA")
            .replace(/[^A-Z0-9\s]/g, "") // Limpa pontuações
            .replace(/\s+/g, " ")
            .trim();
}

// --- REVERSE GEOCODING ---
async function obterBairroTecnico(lat, lon) {
    try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`, {
            headers: { 'User-Agent': 'TratamentoBacklogApp/1.0' }
        });
        if (response.ok) {
            const data = await response.json();
            if (data && data.address) {
                return data.address.suburb || data.address.neighbourhood || data.address.city_district || data.address.residential || "";
            }
        }
    } catch (e) {
        console.error("Erro no reverse geocoding: ", e);
    }
    return "";
}

// --- AUXILIAR DE VALIDAÇÃO DE CENTROIDE (EVITA COORDENADAS FALSAS) ---
function verificarSeEhCentroid(res) {
    const tipo = res.type || "";
    const classVal = res.class || "";
    return (classVal === "place" && (tipo === "city" || tipo === "town" || tipo === "municipality" || tipo === "state"));
}

// --- GEOCODIFICADOR COMPLETO COM AUTO-SKIP E PERSISTÊNCIA EM SEGUNDO PLANO ---
async function geocodificarFila(contratos) {
    const total = contratos.length;
    const btnCarregar = document.getElementById('btn-carregar');
    
    for (let i = 0; i < total; i++) {
        const item = contratos[i];
        
        // --- NOVO: Tenta capturar QUALQUER variação de propriedade de coordenada vinda do banco ---
        const latExistente = item.lat || item.latitude || item.coordY;
        const lonExistente = item.lon || item.longitude || item.coordX;

        // Se o banco de dados já retornou coordenadas válidas de gravação anterior, pula o Nominatim
        if (latExistente !== undefined && latExistente !== null && !isNaN(parseFloat(latExistente)) &&
            lonExistente !== undefined && lonExistente !== null && !isNaN(parseFloat(lonExistente))) {
            
            item.lat = parseFloat(latExistente);
            item.lon = parseFloat(lonExistente);
            item.geocodificadoComSucesso = true;
            continue; // Pula para o próximo contrato imediatamente (carregamento instantâneo)
        }

        btnCarregar.textContent = `MAPEANDO ENDEREÇOS: ${i + 1} de ${total}...`;
        
        const enderecoLimpo = limparEnderecoParaGeocodificacao(item.endereco);
        const busca = `${enderecoLimpo}, ${item.cidade}, SP, Brasil`;
        
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(busca)}&limit=1`, {
                headers: { 'User-Agent': 'TratamentoBacklogApp/1.0' }
            });
            if (response.ok) {
                const data = await response.json();
                if (data && data.length > 0) {
                    const res = data[0];
                    const ehCentroid = verificarSeEhCentroid(res);

                    if (!ehCentroid) {
                        const latitude = parseFloat(res.lat);
                        const longitude = parseFloat(res.lon);
                        
                        item.lat = latitude;
                        item.lon = longitude;
                        item.geocodificadoComSucesso = true;

                        // --- NOVO: Garante o uso de AWAIT para aguardar a gravação antes de seguir no loop ---
                        await salvarCoordenadasNoBanco(item.contrato, item.PartitionKey || item.partitionKey || "", latitude, longitude);
                    } else {
                        // --- NOVO: Se falhar (não encontrar o endereço), grava a coordenada 1.0, 1.0 como flag ---
                        item.lat = 1.0;
                        item.lon = 1.0;
                        item.geocodificadoComSucesso = false;
                        
                        // Salva o erro no banco de dados como marcador "1.0, 1.0" para não tentar mais na próxima busca
                        await salvarCoordenadasNoBanco(item.contrato, item.PartitionKey || item.partitionKey || "", 1.0, 1.0);
                    }
                } else {
                    // Trata ausência de resposta da mesma forma para persistir a flag de erro "1.0, 1.0"
                    item.lat = 1.0;
                    item.lon = 1.0;
                    item.geocodificadoComSucesso = false;
                    await salvarCoordenadasNoBanco(item.contrato, item.PartitionKey || item.partitionKey || "", 1.0, 1.0);
                }
            }
        } catch (e) {
            console.error("Erro ao geocodificar contrato: ", item.contrato, e);
        }
        await delay(150); 
    }
}

// --- ENVIA AS COORDENADAS PARA O BACK-END SALVAR NA TABELA ---
async function salvarCoordenadasNoBanco(contratoId, partitionKey, lat, lon) {
    try {
        const response = await fetch('/api/atualizarCoordenadas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contrato: contratoId,
                partitionKey: partitionKey, // Importante para localizar a partição da data correta
                latitude: lat,
                longitude: lon
            })
        });
        
        if (response.ok) {
            console.log(`Coordenadas persistidas no Azure para o contrato ${contratoId}`);
        } else {
            console.error(`Erro ao salvar coordenadas para o contrato ${contratoId}: Status ${response.status}`);
        }
    } catch (e) {
        console.warn("Não foi possível salvar as coordenadas em segundo plano:", e);
    }
}

// --- ALGORITMO TSP SEQUENCIAL NEAREST-NEIGHBOR ---
function ordenarFilaNearestNeighbor(contratos, startLat, startLon, limiteQtd) {
    if (!contratos || contratos.length === 0) return [];
    
    // CASO 1: Sem coordenadas do técnico (GPS desativado ou falhou)
    if (!startLat || !startLon) {
        return [...contratos].sort((a, b) => {
            const isAOpcao = String(a.tipo).toUpperCase().includes("OPC");
            const isBOpcao = String(b.tipo).toUpperCase().includes("OPC");
            if (isAOpcao && !isBOpcao) return -1;
            if (!isAOpcao && isBOpcao) return 1;
            return 0;
        });
    }

    // CASO 2: GPS ativo. Separamos entre os mapeados com sucesso e os que falharam
    // Filtramos e ignoramos os contratos que possuem a flag de erro de geocodificação "1.0, 1.0"
    const mapeados = contratos.filter(c => c.lat !== null && c.lon !== null && c.geocodificadoComSucesso !== false && c.lat !== 1.0);
    const naoMapeados = contratos.filter(c => c.lat === null || c.lon === null || c.geocodificadoComSucesso === false || c.lat === 1.0);

    const resultadoOrdenado = [];
    
    if (mapeados.length > 0) {
        // 1. Calcula a distância direta de você para todos os contratos mapeados
        mapeados.forEach(c => {
            c.distanciaDireta = calcularDistanciaKm(startLat, startLon, c.lat, c.lon);
        });

        // 2. Ordena o pool completo pela distância direta de você
        mapeados.sort((a, b) => a.distanciaDireta - b.distanciaDireta);

        // 3. Seleciona os N mais próximos para roteirização em cadeia
        const N = limiteQtd === 'ALL' ? mapeados.length : parseInt(limiteQtd, 10);
        const maxPermitido = limiteQtd === 'ALL' ? mapeados.length : (N + 3);

        const candidatosProximos = mapeados.slice(0, Math.min(maxPermitido, mapeados.length));
        const restantesMapeados = mapeados.slice(Math.min(maxPermitido, mapeados.length));

        if (candidatosProximos.length > 0) {
            // Escolhe o primeiro do lote como o absoluto mais próximo de você
            const primeiro = candidatosProximos.shift();
            primeiro.distancia = primeiro.distanciaDireta;
            resultadoOrdenado.push(primeiro);
            let pontoAtual = { lat: primeiro.lat, lon: primeiro.lon };

            // Construção da cadeia (Next-Neighbor)
            while (candidatosProximos.length > 0) {
                let proximoIndex = -1;
                let menorDistanciaLote = Infinity;

                for (let i = 0; i < candidatosProximos.length; i++) {
                    const c = candidatosProximos[i];
                    const dist = calcularDistanciaKm(pontoAtual.lat, pontoAtual.lon, c.lat, c.lon);
                    if (dist < menorDistanciaLote) {
                        menorDistanciaLote = dist;
                        proximoIndex = i;
                    }
                }

                if (proximoIndex !== -1) {
                    const proximo = candidatosProximos.splice(proximoIndex, 1)[0];
                    proximo.distancia = menorDistanciaLote;
                    resultadoOrdenado.push(proximo);
                    pontoAtual = { lat: proximo.lat, lon: proximo.lon };
                } else {
                    break;
                }
            }
        }
        
        // Se houver contratos mapeados que ficaram fora do limite inicial de busca, anexa-os na sequência
        if (restantesMapeados.length > 0) {
            resultadoOrdenado.push(...restantesMapeados);
        }
    }

    // 4. Contratos que falharam na geocodificação são inseridos no final da fila
    if (naoMapeados.length > 0) {
        resultadoOrdenado.push(...naoMapeados);
    }

    return resultadoOrdenado;
}

// --- PROCESSADOR FINAL E ROTEIRIZAÇÃO DE CONTRATOS ---
async function prosseguirProcessamentoContratos(contratosParaProcessar, limit) {
    const btnCarregar = document.getElementById('btn-carregar');
    btnCarregar.disabled = true;

    todosContratosOrdenados = [];
    indexExibicaoAtual = 0;

    if (contratosParaProcessar.length > 0) {
        if (localizacaoTecnico) {
            await geocodificarFila(contratosParaProcessar);
            todosContratosOrdenados = ordenarFilaNearestNeighbor(contratosParaProcessar, localizacaoTecnico.latitude, localizacaoTecnico.longitude, limit);
        } else {
            todosContratosOrdenados = ordenarFilaNearestNeighbor(contratosParaProcessar, null, null, limit);
        }
    }

    const blocoExibicao = todosContratosOrdenados.slice(indexExibicaoAtual, indexExibicaoAtual + limiteExibicao);

    if (blocoExibicao.length === 0) {
        alert("Fim da fila! Não há contratos pendentes para os critérios selecionados.");
        btnCarregar.disabled = false;
        btnCarregar.textContent = "CARREGAR FILA E ORDENAR POR PROXIMIDADE";
        return;
    }

    renderizarContratos(blocoExibicao);
    indexExibicaoAtual += limiteExibicao;

    if (indexExibicaoAtual < todosContratosOrdenados.length) {
        const restantes = todosContratosOrdenados.length - indexExibicaoAtual;
        btnCarregar.textContent = `CARREGAR PRÓXIMOS ${Math.min(limiteExibicao, restantes)} CONTRATOS 🧭`;
    } else {
        btnCarregar.textContent = "FIM DA FILA! RECARREGAR DO INÍCIO 🔄";
        indexExibicaoAtual = 0; 
    }

    // Exibe o botão do Mapa de Backlog caso existam contratos carregados em memória
    document.getElementById('btn-mapa-backlog').style.display = 'block';

    btnCarregar.disabled = false;
}

    }

    localStorage.setItem('login_tecnico', login);

    document.getElementById('card-bairro-selecao').style.display = 'none';

    btnCarregar.disabled = true;
    btnCarregar.textContent = "OBTENDO GEOLOCALIZAÇÃO...";

    try {
        localizacaoTecnico = await obterGeolocalizacao();
        document.getElementById('alert-gps-global').innerHTML = ""; 
    } catch (e) {
        if (modo === 'BAIRRO') {
            alert("O uso do GPS é obrigatório para detectar seu bairro atual. Por favor, ative a localização ou mude para o modo 'Geral'.");
            btnCarregar.disabled = false;

            </div>
        `;
    }

    btnCarregar.textContent = "BUSCANDO DADOS NO AZURE...";

    // Se estivermos no modo bairro, trazemos todos os bairros da cidade para poder mapeá-los localmente [2]
    let limiteSwaQuery = limit;

        limiteSwaQuery = 'ALL';
    } else if (limit !== 'ALL') {
        limiteSwaQuery = parseInt(limit, 10) * 2;
    }

    let contratosFiltrados = [];
    try {
        const response = await fetch(`/api/obterContratos?cidade=${cidade}&safra=${safra}&tipo=${tipo}&limit=${limiteSwaQuery}`);
        if (response.ok) {
            contratosFiltrados = await response.json();
        } else {
            alert("Erro ao buscar registros da base do Azure.");
            btnCarregar.disabled = false;
            btnCarregar.textContent = "CARREGAR FILA E ORDENAR POR PROXIMIDADE";
            return;
        }

        console.error("Erro na requisição: ", err);
        alert("Falha de conexão com o banco de dados do Azure.");
        btnCarregar.disabled = false;
        btnCarregar.textContent = "CARREGAR FILA E ORDENAR POR PROXIMIDADE";
        return;
    }

    if (contratosFiltrados.length === 0) {
        alert("Nenhum contrato localizado para os critérios informados.");
        btnCarregar.disabled = false;
        btnCarregar.textContent = "CARREGAR FILA E ORDENAR POR PROXIMIDADE";
        return;
    }

    contratosCarregadosTemporarios = contratosFiltrados;

    if (modo === 'BAIRRO') {
        btnCarregar.textContent = "IDENTIFICANDO SEU BAIRRO ATUAL...";
        let bairroDetectado = "";
        try {
            bairroDetectado = await obterBairroTecnico(localizacaoTecnico.latitude, localizacaoTecnico.longitude);
        } catch (e) {
            console.error("Erro ao obter bairro: ", e);
        }

        const normTech = normalizarBairro(bairroDetectado);
        const stopWords = ["JARDIM", "JD", "VILA", "VL", "PARQUE", "PQ", "CONJUNTO", "COHAB", "RESIDENCIAL", "RES", "CHACARA", "CH", "SETOR", "CENTRO"];
        const coreWords = normTech.split(" ").filter(w => !stopWords.includes(w) && w.length > 2);

        // Coleta bairros existentes nos contratos buscados
        const bairrosNoDb = [...new Set(contratosFiltrados.map(c => c.bairro).filter(Boolean))];

        // Mapeia termos aproximados/variações
        let sugestoes = [];
        if (coreWords.length > 0) {
            sugestoes = bairrosNoDb.filter(bDb => {
                const normDb = normalizarBairro(bDb);
                return coreWords.some(word => normDb.includes(word));
            });
        } else if (normTech) {
            sugestoes = bairrosNoDb.filter(bDb => normalizarBairro(bDb).includes(normTech));
        }

        const selectBairro = document.getElementById('select-bairro-correspondente');
        selectBairro.innerHTML = "";

        if (sugestoes.length > 0) {
            document.getElementById('bairro-detectado-info').innerHTML = `Seu GPS indica que você está em/próximo ao bairro <strong>${bairroDetectado || "Não identificado"}</strong>.<br>Identificamos as seguintes variações correspondentes nos contratos de hoje:`;
            
            sugestoes.forEach(sug => {
                const opt = document.createElement('option');
                opt.value = sug;
                opt.textContent = `📍 [SUGERIDO] - ${sug}`;
                selectBairro.appendChild(opt);
            });

            // Adiciona demais bairros da busca caso queira alternar manualmente
            const outrosBairros = bairrosNoDb.filter(b => !sugestoes.includes(b));
            if (outrosBairros.length > 0) {
                const divisor = document.createElement('option');
                divisor.disabled = true;
                divisor.textContent = "----------------- OUTROS BAIRROS DISPONÍVEIS -----------------";
                selectBairro.appendChild(divisor);

                outrosBairros.sort().forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b;
                    opt.textContent = b;
                    selectBairro.appendChild(opt);
                });
            }
        } else {
            document.getElementById('bairro-detectado-info').innerHTML = `Seu GPS indica o bairro <strong>${bairroDetectado || "Não identificado"}</strong>, mas nenhuma variação exata de contratos foi localizada neste perímetro de hoje.<br>Escolha manualmente na lista qual bairro deseja filtrar:`;
            
            bairrosNoDb.sort().forEach(b => {
                const opt = document.createElement('option');
                opt.value = b;
                opt.textContent = b;
                selectBairro.appendChild(opt);
            });
        }

        // Exibe o card de escolha
        document.getElementById('card-bairro-selecao').style.display = 'block';
        btnCarregar.disabled = false;
        btnCarregar.textContent = "CARREGAR FILA E ORDENAR POR PROXIMIDADE";
        document.getElementById('card-bairro-selecao').scrollIntoView({ behavior: 'smooth' });

    } else {
        // Fluxo padrão Geral
        await prosseguirProcessamentoContratos(contratosFiltrados, limit);
    }
});

            </div>

                <button id="btn-concluir-final-${item.contrato}" class="btn-success" style="margin-top: 15px;" disabled onclick="enviarAtendimentoFinal('${item.contrato}')">SALVAR ATENDIMENTO</button>
            </div>
        `;
        container.appendChild(card);
    });
}

// --- REDIRECIONAMENTO DE MAPAS ---
function irParaMapa(lat, lon, address, city) {
    // Se a coordenada for a flag de erro (1.0, 1.0), ignora redirecionamento por GPS
    if (lat && lon && !isNaN(lat) && !isNaN(lon) && lat !== 0 && lat !== 1.0) {
        if (localizacaoTecnico) {
            window.open(`https://www.google.com/maps/dir/?api=1&origin=${localizacaoTecnico.latitude},${localizacaoTecnico.longitude}&destination=${lat},${lon}&travelmode=driving`, '_blank');
        } else {
            window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lon}`, '_blank');
        }
    } else if (address) {
        const buscaEnderecoCompleto = `${address}, ${city || ''} - SP`;
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(buscaEnderecoCompleto)}`, '_blank');
    } else {
        alert("Endereço não disponível para navegação.");
    }
}

// --- ALTERNADOR DE STATUS (PRODUTIVO VS IMPRODUTIVO) ---
function selecionarStatusAtendimento(contratoId, status) {
    statusAtendimento[contratoId] = status;
    
    const btnProd = document.getElementById(`btn-prod-${contratoId}`);
    const btnImprod = document.getElementById(`btn-improd-${contratoId}`);
    const boxProd = document.getElementById(`box-produtivo-${contratoId}`);
    const boxImprod = document.getElementById(`box-improdutivo-${contratoId}`);

    if (status === 'PRODUTIVO') {
        btnProd.classList.add('active-prod');
        btnImprod.classList.remove('active-improd');
        boxProd.style.display = 'block';
        boxImprod.style.display = 'none';
    } else {
        btnProd.classList.remove('active-prod');
        btnImprod.classList.add('active-improd');
        boxProd.style.display = 'none';
        boxImprod.style.display = 'block';
    }
    validarConclusao(contratoId);
}

// --- FLUXO DE ADICIONAR E EXCLUIR FOTOS DO EQUIPAMENTO (MÚLTIPLAS) ---
function adicionarFotoEquipamento(contratoId, input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        fotosEquipamentos[contratoId].push(e.target.result);
        renderizarFotosEquipamentos(contratoId);
        validarConclusao(contratoId);
    };
    reader.readAsDataURL(file);
    input.value = ""; 
}

// --- RENDERIZADOR DE GRID DE FOTOS ---
function renderizarFotosEquipamentos(contratoId) {
    const grid = document.getElementById(`grid-fotos-${contratoId}`);
    grid.innerHTML = "";

    fotosEquipamentos[contratoId].forEach((imgSrc, index) => {
        const imgContainer = document.createElement('div');
        imgContainer.style.position = "relative";
        imgContainer.style.aspectRatio = "1";
        
        const img = document.createElement('img');
        img.src = imgSrc;
        img.style.width = "100%";
        img.style.height = "100%";
        img.style.objectFit = "cover";
        img.style.borderRadius = "6px";
        img.style.border = "1px solid #475569";
        
        const deleteBtn = document.createElement('button');
        deleteBtn.type = "button";
        deleteBtn.innerHTML = "✕";
        deleteBtn.style.position = "absolute";
        deleteBtn.style.top = "2px";
        deleteBtn.style.right = "2px";
        deleteBtn.style.background = "#ef4444";
        deleteBtn.style.color = "white";
        deleteBtn.style.border = "none";
        deleteBtn.style.borderRadius = "50%";
        deleteBtn.style.width = "20px";
        deleteBtn.style.height = "20px";
        deleteBtn.style.fontSize = "10px";
        deleteBtn.style.cursor = "pointer";
        deleteBtn.style.display = "flex";
        deleteBtn.style.alignItems = "center";
        deleteBtn.style.justifyContent = "center";
        deleteBtn.style.fontWeight = "bold";
        
        deleteBtn.onclick = () => {
            fotosEquipamentos[contratoId].splice(index, 1);
            renderizarFotosEquipamentos(contratoId);
            validarConclusao(contratoId);
        };
        
        imgContainer.appendChild(img);
        imgContainer.appendChild(deleteBtn);
        grid.appendChild(imgContainer);
    });
}

// --- FLUXO DE ADICIONAR E EXCLUIR FOTO DA FACHADA (IMPRODUTIVO) ---
function definirFotoFachada(contratoId, input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        fotoFachada[contratoId] = e.target.result;
        
        const previewDiv = document.getElementById(`preview-fachada-${contratoId}`);
        previewDiv.innerHTML = `
            <div style="position:relative; width: 100px; aspect-ratio:1;">
                <img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover; border-radius:6px; border:1px solid #475569;">
                <button type="button" style="position:absolute; top:2px; right:2px; background:#ef4444; color:white; border:none; border-radius:50%; width:20px; height:20px; font-size:10px; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; font-weight:bold;" onclick="removerFotoFachada('${contratoId}')">✕</button>
            </div>
        `;
        validarConclusao(contratoId);
    };
    reader.readAsDataURL(file);
    input.value = "";
}

function removerFotoFachada(contratoId) {
    fotoFachada[contratoId] = null;
    document.getElementById(`preview-fachada-${contratoId}`).innerHTML = "";
    validarConclusao(contratoId);
}

// --- ATUALIZAÇÃO DO GPS MANUAL ---
async function obterGpsManual(contratoId) {
    const btnGps = document.getElementById(`btn-gps-manual-${contratoId}`);
    btnGps.disabled = true;
    btnGps.textContent = "BUSCANDO SATÉLITE...";
    try {
        localizacaoTecnico = await obterGeolocalizacao();
    } catch (e) {
        alert("Não foi possível acessar sua localização. Certifique-se de ativar o GPS de seu aparelho.");
    }
    btnGps.disabled = false;
    btnGps.textContent = "⚠️ ATUALIZAR GEOLOCALIZAÇÃO";
    validarConclusao(contratoId);
}

// --- VALIDAÇÃO GERAL DE REQUISITOS ---
function validarConclusao(contratoId) {
    const statusAtivo = statusAtendimento[contratoId];
    const btnConcluir = document.getElementById(`btn-concluir-final-${contratoId}`);
    
    if (!statusAtivo) {
        btnConcluir.disabled = true;
        return;
    }

    if (statusAtivo === 'PRODUTIVO') {
        const qtdFotos = fotosEquipamentos[contratoId] ? fotosEquipamentos[contratoId].length : 0;
        btnConcluir.disabled = (qtdFotos === 0);
    } else if (statusAtivo === 'IMPRODUTIVO') {
        const temFotoFachada = !!fotoFachada[contratoId];
        const codigoBaixa = document.getElementById(`input-codigo-baixa-${contratoId}`).value.trim();
        const temGps = !!(localizacaoTecnico && localizacaoTecnico.latitude && localizacaoTecnico.longitude);

        const statusGpsBox = document.getElementById(`status-gps-${contratoId}`);
        const btnGps = document.getElementById(`btn-gps-manual-${contratoId}`);
        
        if (temGps) {
            statusGpsBox.style.background = "#14532d";
            statusGpsBox.style.color = "#4ade80";
            statusGpsBox.style.border = "1px solid #22c55e";
            statusGpsBox.innerHTML = `📍 GPS CAPTURADO:<br>Lat ${localizacaoTecnico.latitude} | Lon ${localizacaoTecnico.longitude}`;
            btnGps.style.display = "none";
        } else {
            statusGpsBox.style.background = "#7f1d1d";
            statusGpsBox.style.color = "#fca5a5";
            statusGpsBox.style.border = "1px solid #ef4444";
            statusGpsBox.innerHTML = `⚠️ GEOLOCALIZAÇÃO OBRIGATÓRIA PENDENTE.`;
            btnGps.style.display = "block";
        }

        btnConcluir.disabled = !(temFotoFachada && codigoBaixa && temGps);
    }
}

// --- CONCLUSÃO E ENVIO PARA O AZURE ---
async function enviarAtendimentoFinal(contratoId) {
    const statusAtivo = statusAtendimento[contratoId];
    const tecnico = localStorage.getItem('login_tecnico');
    const btnSalvar = document.getElementById(`btn-concluir-final-${contratoId}`);

    btnSalvar.disabled = true;
    btnSalvar.textContent = "SALVANDO NO AZURE...";

    let payload = {
        contrato: contratoId,
        tecnico: tecnico,
        status: statusAtivo,
        data_conclusao: new Date().toISOString(),
        localizacao: localizacaoTecnico ? {
            latitude: localizacaoTecnico.latitude,
            longitude: localizacaoTecnico.longitude
        } : null
    };

    if (statusAtivo === 'PRODUTIVO') {
        payload.imagens_etiqueta = fotosEquipamentos[contratoId];
    } else {
        payload.imagem_fachada = fotoFachada[contratoId];
        payload.codigo_baixa = document.getElementById(`input-codigo-baixa-${contratoId}`).value.trim();
        payload.observacao_conclusao = document.getElementById(`input-desc-improdutivo-${contratoId}`).value.trim();
    }

    try {
        const response = await fetch('/api/concluirAtendimento', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert(`Atendimento do contrato ${contratoId} registrado com sucesso!`);

            const registroHistorico = {
                contrato: contratoId,
                status: statusAtivo,
                dataHora: new Date().toISOString(),
                tecnico: tecnico,
                codigo_baixa: statusAtivo === 'IMPRODUTIVO' ? payload.codigo_baixa : null,
                observacao: statusAtivo === 'IMPRODUTIVO' ? payload.observacao_conclusao : "EQUIPAMENTO RETIRADO COM SUCESSO",
                qtd_fotos: statusAtivo === 'PRODUTIVO' ? payload.imagens_etiqueta.length : 1
            };
            salvarNoHistoricoLocal(registroHistorico);

            document.getElementById(`card-${contratoId}`).remove();
            
            delete fotosEquipamentos[contratoId];
            delete fotoFachada[contratoId];
            delete statusAtendimento[contratoId];

            const container = document.getElementById('lista-contratos');
            if (container.children.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#94a3b8; font-size:14px;">✅ Fila finalizada! Todos os contratos próximos foram atendidos.</div>';
            }
        } else {
            const erro = await response.json();
            alert("Erro ao salvar no Azure: " + (erro.error || "Erro desconhecido"));
            btnSalvar.disabled = false;
            btnSalvar.textContent = "SALVAR ATENDIMENTO";
        }
    } catch (err) {
        console.error(err);
        alert("Erro de rede ao conectar com o serviço do Azure.");
        btnSalvar.disabled = false;
        btnSalvar.textContent = "SALVAR ATENDIMENTO";
    }
}

// --- FUNÇÕES DE CONTROLE DO HISTÓRICO LOCAL ---
function salvarNoHistoricoLocal(novoRegistro) {
    let historico = [];
    try {
        historico = JSON.parse(localStorage.getItem('historico_atendimentos')) || [];
    } catch (e) {
        historico = [];
    }
    historico.unshift(novoRegistro); 
    
    if (historico.length > 50) {
        historico = historico.slice(0, 50);
    }
    localStorage.setItem('historico_atendimentos', JSON.stringify(historico));
}

    const boxConclusao = document.getElementById(`conclusao-${contratoId}`);

    if (boxConclusao.style.display === "block") {

// --- BUSCA OS MODELOS DO CONTRATO ---
async function obterEquipamentosDoContrato(contratoId) {
    // 1. Tenta varrer localmente os contratos em memória na fila ativa do aparelho
    let contratoEncontrado = contratosCarregadosTemporarios.find(c => String(c.contrato) === String(contratoId)) || 
                             todosContratosOrdenados.find(c => String(c.contrato) === String(contratoId));
    
    if (contratoEncontrado && contratoEncontrado.modelo_equip) {
        const modelos = contratoEncontrado.modelo_equip.split(/[,/;|]/).map(m => m.trim().toUpperCase()).filter(Boolean);
        if (modelos.length > 0) return modelos;
    }

    // 2. Tenta fazer uma requisição silenciosa de recuperação da base do Azure
    try {
        const response = await fetch(`/api/obterContratos?limit=ALL`);
        if (response.ok) {
            const contratos = await response.json();
            const found = contratos.find(c => String(c.contrato) === String(contratoId));
            if (found && found.modelo_equip) {
                const modelos = found.modelo_equip.split(/[,/;|]/).map(m => m.trim().toUpperCase()).filter(Boolean);
                if (modelos.length > 0) return modelos;
            }
        }
    } catch (e) {
        console.error("Erro ao pesquisar equipamentos adicionais:", e);
    }

    // 3. Fallback genérico
    return ["MODEM WIFI / MTA CLARO", "DECODER HD / 4K CLARO", "ONU FIBRA", "REPETIDOR WIFI", "OUTROS"];
}

// --- FUNÇÃO PARA INICIAR PAINEL DE REVERSÃO NO CARD DE HISTÓRICO LOCAL ---
async function iniciarReversaoHistorico(contratoId) {
    const box = document.getElementById(`box-reversao-${contratoId}`);

    if (box.style.display === "block") {
        box.style.display = "none";

    box.style.display = "block";
    box.innerHTML = `<div style="text-align: center; color: #94a3b8; padding: 10px; font-size: 11px;">Carregando configurações...</div>`;

    const equipamentos = await obterEquipamentosDoContrato(contratoId);
    equipamentosContratoReversao[contratoId] = equipamentos;

    fotosReversao[contratoId] = [];
    fotoFachadaReversao[contratoId] = null;
    statusReversao[contratoId] = "PRODUTIVO"; // Começa setado para reverter como Produtivo

    renderizarFormularioReversao(contratoId);
}

                <div id="preview-fachada-rev-${contratoId}" style="margin-bottom: 10px;"></div>

                <label style="font-size:12px;">Código de Baixa</label>
                <input type="text" id="rev-codigo-baixa-${contratoId}" placeholder="EX: CLIENTE AUSENTE" oninput="this.value = this.value.toUpperCase()" style="padding:8px; font-size:13px;">

                <label style="font-size:12px;">Descrição Opcional</label>
                <textarea id="rev-obs-${contratoId}" placeholder="DIGITE INFORMAÇÕES ADICIONAIS" style="width: 100%; padding: 8px; border-radius: 6px; background: #0f172a; color: white; border: 1px solid #334155; margin-top: 5px; box-sizing: border-box; font-family: inherit; font-size: 13px;" oninput="this.value = this.value.toUpperCase()"></textarea>
            </div>
        `;
    }

    box.innerHTML = `
        <div style="background: #1e293b; border: 1px solid #f59e0b; border-radius: 6px; padding: 12px; text-align: left; box-sizing: border-box; margin-top:10px;">
            <h4 style="margin-top: 0; color: #f59e0b; font-size: 13px;">🔄 Reverter / Alterar Status</h4>
            
            <label style="margin-top: 0; font-size:12px;">Novo Resultado:</label>
            <div style="display: flex; gap: 8px; margin-top: 5px;">
                <button type="button" class="btn-status-choice ${statusAtivo === 'PRODUTIVO' ? 'active-prod' : ''}" style="padding: 8px; font-size:11px;" onclick="setReversaoStatus('${contratoId}', 'PRODUTIVO')">👍 PRODUTIVO</button>
                <button type="button" class="btn-status-choice ${statusAtivo === 'IMPRODUTIVO' ? 'active-improd' : ''}" style="padding: 8px; font-size:11px;" onclick="setReversaoStatus('${contratoId}', 'IMPRODUTIVO')">👎 IMPRODUTIVO</button>
            </div>

            ${subFormHTML}

            <div style="display: flex; gap: 8px; margin-top: 15px; justify-content: flex-end;">
                <button type="button" class="btn-secondary" style="padding: 6px 12px; font-size: 11px; width:auto;" onclick="cancelarReversao('${contratoId}')">CANCELAR</button>
                <button type="button" class="btn-success" style="padding: 6px 12px; font-size: 11px; width:auto;" onclick="salvarReversaoFinal('${contratoId}')">SALVAR</button>
            </div>
        </div>
    `;

    if (statusAtivo === "PRODUTIVO") {
        renderizarFotosReversaoGrid(contratoId);
    }
}

// --- ADICIONAR E RETIRAR EVIDÊNCIAS NO FLUXO DE REVERSÃO ---
function adicionarFotoReversao(contratoId, input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const opcoesModelos = equipamentosContratoReversao[contratoId] || [];
        const modeloInicial = opcoesModelos.length > 0 ? opcoesModelos[0] : "OUTROS";

        fotosReversao[contratoId].push({
            base64: e.target.result,
            equipamento: modeloInicial
        });

        renderizarFotosReversaoGrid(contratoId);
    };
    reader.readAsDataURL(file);
    input.value = "";
}

function renderizarFotosReversaoGrid(contratoId) {
    const grid = document.getElementById(`grid-fotos-reversao-${contratoId}`);
    if (!grid) return;

    grid.innerHTML = "";
    const fotos = fotosReversao[contratoId] || [];
    const equipamentosDoContrato = equipamentosContratoReversao[contratoId] || [];

    fotos.forEach((fotoObj, index) => {
        const itemContainer = document.createElement('div');
        itemContainer.style.background = "#0f172a";
        itemContainer.style.border = "1px solid #334155";
        itemContainer.style.borderRadius = "6px";
        itemContainer.style.padding = "8px";
        itemContainer.style.position = "relative";
        itemContainer.style.display = "flex";
        itemContainer.style.flexDirection = "column";

        const img = document.createElement('img');
        img.src = fotoObj.base64;
        img.style.width = "100%";
        img.style.aspectRatio = "4/3";
        img.style.objectFit = "cover";
        img.style.borderRadius = "4px";

        const delBtn = document.createElement('button');
        delBtn.type = "button";
        delBtn.innerHTML = "✕";
        delBtn.style.position = "absolute";
        delBtn.style.top = "12px";
        delBtn.style.right = "12px";
        delBtn.style.background = "#ef4444";
        delBtn.style.color = "white";
        delBtn.style.border = "none";
        delBtn.style.borderRadius = "50%";
        delBtn.style.width = "18px";
        delBtn.style.height = "18px";
        delBtn.style.fontSize = "10px";
        delBtn.style.cursor = "pointer";
        delBtn.style.display = "flex";
        delBtn.style.alignItems = "center";
        delBtn.style.justifyContent = "center";
        delBtn.style.padding = "0";
        delBtn.onclick = () => {
            fotosReversao[contratoId].splice(index, 1);
            renderizarFotosReversaoGrid(contratoId);
        };

        const selectLabel = document.createElement('label');
        selectLabel.textContent = "Equipamento:";
        selectLabel.style.fontSize = "11px";
        selectLabel.style.marginTop = "6px";
        selectLabel.style.color = "#94a3b8";

        const select = document.createElement('select');
        select.style.padding = "4px";
        select.style.fontSize = "11px";
        select.style.marginTop = "2px";

        equipamentosDoContrato.forEach(eq => {
            const opt = document.createElement('option');
            opt.value = eq;
            opt.textContent = eq;
            if (eq === fotoObj.equipamento) opt.selected = true;
            select.appendChild(opt);
        });

        select.onchange = (e) => {
            fotosReversao[contratoId][index].equipamento = e.target.value;
        };

        itemContainer.appendChild(img);
        itemContainer.appendChild(delBtn);
        itemContainer.appendChild(selectLabel);
        itemContainer.appendChild(select);

        grid.appendChild(itemContainer);
    });
}

function definirFotoFachadaReversao(contratoId, input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        fotoFachadaReversao[contratoId] = e.target.result;

        const preview = document.getElementById(`preview-fachada-rev-${contratoId}`);
        if (preview) {
            preview.innerHTML = `
                <div style="position: relative; width: 80px; aspect-ratio: 1; margin-top: 8px;">
                    <img src="${e.target.result}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 4px; border: 1px solid #475569;">
                    <button type="button" style="position: absolute; top: 2px; right: 2px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; font-weight: bold;" onclick="removerFotoFachadaReversao('${contratoId}')">✕</button>
                </div>
            `;
        }
    };
    reader.readAsDataURL(file);
    input.value = "";
}

function removerFotoFachadaReversao(contratoId) {
    fotoFachadaReversao[contratoId] = null;
    const preview = document.getElementById(`preview-fachada-rev-${contratoId}`);
    if (preview) preview.innerHTML = "";
}

function setReversaoStatus(contratoId, status) {
    statusReversao[contratoId] = status;
    renderizarFormularioReversao(contratoId);
}

function cancelarReversao(contratoId) {
    const box = document.getElementById(`box-reversao-${contratoId}`);
    if (box) box.style.display = "none";
}

// --- EXECUÇÃO FINAL DA GRAVAÇÃO DA REVERSÃO ---
async function salvarReversaoFinal(contratoId) {
    const statusAtivo = statusReversao[contratoId];
    const tecnico = localStorage.getItem('login_tecnico');

    if (statusAtivo === "PRODUTIVO") {
        if (!fotosReversao[contratoId] || fotosReversao[contratoId].length === 0) {
            alert("Erro: Adicione pelo menos uma foto de equipamento.");
            return;
        }
        const mac = document.getElementById(`rev-mac-${contratoId}`).value.trim();
        if (!mac) {
            alert("Erro: Informe o MAC / Serial do equipamento.");
            return;
        }
    } else {
        if (!fotoFachadaReversao[contratoId]) {
            alert("Erro: A foto de fachada é necessária para registros improdutivos.");
            return;
        }
        const codigoBaixa = document.getElementById(`rev-codigo-baixa-${contratoId}`).value.trim();
        if (!codigoBaixa) {
            alert("Erro: Preencha o código de baixa.");
            return;
        }
    }

    const payload = {
        contrato: contratoId,
        status: statusAtivo,
        data_reversao: new Date().toISOString(),
        tecnico: tecnico
    };

    if (statusAtivo === "PRODUTIVO") {
        payload.fotos = fotosReversao[contratoId].map(f => f.base64);
        payload.equipamentos_associados = fotosReversao[contratoId].map(f => f.equipamento);
        payload.mac = document.getElementById(`rev-mac-${contratoId}`).value.trim();
    } else {
        payload.fotos = [fotoFachadaReversao[contratoId]];
        payload.codigo_baixa = document.getElementById(`rev-codigo-baixa-${contratoId}`).value.trim();
        payload.observacao_conclusao = document.getElementById(`rev-obs-${contratoId}`).value.trim();
    }

    try {
        const response = await fetch('/api/reverterAtendimento', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert("Atendimento revertido e sincronizado com sucesso!");

            // Atualiza o item de histórico local correspondente na máquina do técnico
            let historicoLocal = [];
            try {
                historicoLocal = JSON.parse(localStorage.getItem('historico_atendimentos')) || [];
            } catch (e) {
                historicoLocal = [];
            }

            const itemIdx = historicoLocal.findIndex(h => String(h.contrato) === String(contratoId));
            if (itemIdx !== -1) {
                historicoLocal[itemIdx].status = statusAtivo;
                historicoLocal[itemIdx].dataHora = payload.data_reversao;
                historicoLocal[itemIdx].codigo_baixa = statusAtivo === 'IMPRODUTIVO' ? payload.codigo_baixa : null;
                historicoLocal[itemIdx].observacao = statusAtivo === 'IMPRODUTIVO' ? payload.observacao_conclusao : "EQUIPAMENTO RETIRADO COM SUCESSO";
                historicoLocal[itemIdx].qtd_fotos = statusAtivo === 'PRODUTIVO' ? payload.fotos.length : 1;
                
                localStorage.setItem('historico_atendimentos', JSON.stringify(historicoLocal));
            }

            // Atualiza a visualização do histórico local do técnico
            renderizarListaHistorico();
        } else {
            const err = await response.json();
            alert("Falha no Azure ao processar reversão: " + (err.error || "Erro interno"));
        }
    } catch (e) {
        console.error("Erro na comunicação de rede:", e);
        alert("Erro de rede ao salvar as edições de reversão.");
    }
}

// ==========================================
// --- SISTEMA DO MAPA GERAL DO BACKLOG ---
// ==========================================

// --- ABRE O MODAL E INICIALIZA O LEAFLET ---
function abrirMapaBacklog() {
    if (!todosContratosOrdenados || todosContratosOrdenados.length === 0) {
        alert("Por favor, carregue os contratos primeiro!");
        return;
    }

    document.getElementById('modal-mapa-backlog').style.display = 'block';

    // Aguarda o container do mapa ser renderizado no DOM antes de inicializar o Leaflet
    setTimeout(() => {
        inicializarMapaLeaflet();
    }, 250);
}

// --- FECHA O MODAL DO MAPA ---
function fecharMapaBacklog() {
    document.getElementById('modal-mapa-backlog').style.display = 'none';
}

// --- INICIALIZA OU REDIMENSIONA O MAPA ---
function inicializarMapaLeaflet() {
    // Se o mapa já foi criado anteriormente, reajusta seu tamanho
    if (mapaBacklogInstance) {
        mapaBacklogInstance.invalidateSize();
    } else {
        // Posição inicial neutra
        mapaBacklogInstance = L.map('mapa-backlog-leaflet').setView([-22.3145, -49.0587], 13);

        // Adiciona a camada pública de tiles do OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(mapaBacklogInstance);

        markersGroup = L.layerGroup().addTo(mapaBacklogInstance);
    }

    // Limpa pontos anteriores antes de redesenhar
    markersGroup.clearLayers();

    // Filtra apenas os contratos que foram geocodificados com sucesso e ignora os marcadores de erro "1.0, 1.0"
    const contratosComGps = todosContratosOrdenados.filter(c => c.lat !== null && c.lon !== null && c.lat !== 1.0);

    if (contratosComGps.length === 0) {
        alert("Nenhum contrato ativo possui coordenadas geocodificadas para exibição.");
        return;
    }

    const bounds = [];

    // 1. Adiciona marcador da localização atual do técnico
    if (localizacaoTecnico) {
        const userLat = localizacaoTecnico.latitude;
        const userLon = localizacaoTecnico.longitude;
        bounds.push([userLat, userLon]);

        const userMarker = L.circleMarker([userLat, userLon], {
            color: '#0ea5e9',
            fillColor: '#38bdf8',
            fillOpacity: 0.8,
            radius: 9,
            weight: 3
        }).addTo(markersGroup);
        userMarker.bindPopup("<b style='color:#0ea5e9;'>Minha Posição Atual 🚗</b>");
    }

    // 2. Adiciona marcadores de cada um dos contratos do backlog
    contratosComGps.forEach(c => {
        const cLat = parseFloat(c.lat);
        const cLon = parseFloat(c.lon);
        bounds.push([cLat, cLon]);

        // Mapeia cor do ponto de acordo com a prioridade
        const markerColor = c.tipo.includes('OPC') ? '#2563eb' : '#ef4444';

        const contractMarker = L.circleMarker([cLat, cLon], {
            color: markerColor,
            fillColor: markerColor,
            fillOpacity: 0.8,
            radius: 7,
            weight: 2
        }).addTo(markersGroup);

        const popHTML = `
            <div style="color: #0f172a; font-family: sans-serif; font-size: 13px; min-width: 180px;">
                <b style="color: #1e3a8a; display: block; border-bottom: 1px dashed #cbd5e1; padding-bottom: 3px; margin-bottom: 5px;">CONTRATO: ${c.contrato}</b>
                <strong>Titular:</strong> ${c.titular}<br>
                <strong>Tipo:</strong> ${c.tipo}<br>
                <strong>Endereço:</strong> ${c.endereco}<br>
                <button onclick="irParaMapa(${cLat}, ${cLon}, '${c.endereco.replace(/'/g, "\\'")}', '${c.cidade}'); fecharMapaBacklog();" style="background: #22c55e; color: white; border: none; border-radius: 4px; padding: 6px 10px; font-weight: bold; font-size: 11px; width: 100%; cursor: pointer; margin-top: 8px;">🧭 TRAÇAR ROTA NO GPS</button>
            </div>
        `;
        contractMarker.bindPopup(popHTML);
    });

    // 3. Ajusta o enquadramento da câmera do mapa de forma inteligente
    if (localizacaoTecnico) {
        // Se a localização do técnico estiver disponível, foca nela com nível de zoom aproximado 14
        mapaBacklogInstance.setView([localizacaoTecnico.latitude, localizacaoTecnico.longitude], 14);
    } else if (bounds.length > 0) {
        // Fallback: Caso o GPS esteja desativado, enquadra todos os pontos no mapa
        mapaBacklogInstance.fitBounds(bounds, { padding: [40, 40] });
    }
}

window.addEventListener('load', async () => {
    const loginSalvo = localStorage.getItem('login_tecnico');
    if (loginSalvo) {
        // Tenta revalidar automaticamente de forma transparente [2]
        await validarAcesso(loginSalvo, true);
    } else {
        exibirLogin(true);
    }
});
</script>
