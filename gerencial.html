<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Gerencial - Carga de Contratos</title>

<!-- Biblioteca para processar arquivos CSV de forma rápida -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}
.header {
    background: #1e293b;
    padding: 20px;
    font-size: 20px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #334155;
    box-sizing: border-box;
}
.btn-nav {
    background: #475569;
    color: white;
    padding: 8px 15px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
}
.btn-nav:hover { background: #334155; }
.container {
    padding: 20px;
    max-width: 650px;
    margin: 0 auto;
}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    border: 1px solid #334155;
}
label {
    display: block;
    margin-top: 15px;
    font-size: 14px;
    color: #94a3b8;
}
input, select {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
    margin-top: 5px;
    box-sizing: border-box;
    font-family: inherit;
    font-size: 14px;
}
button {
    color: white;
    padding: 14px 20px;
    border: none;
    border-radius: 8px;
    width: 100%;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
}
.btn-primary { background: #2563eb; margin-top: 20px; }
.btn-primary:active { background: #1d4ed8; }
.btn-primary:disabled { background: #1e293b; color: #4b5563; cursor: not-allowed; }

.radio-group {
    display: flex;
    gap: 15px;
    margin-top: 10px;
}
.radio-option {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    cursor: pointer;
}
.radio-option input {
    width: auto;
    margin: 0;
}
.table-container {
    overflow-x: auto;
    margin-top: 15px;
    border: 1px solid #334155;
    border-radius: 8px;
}
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    text-align: left;
    background: #0f172a;
}
th, td {
    padding: 8px 10px;
    border-bottom: 1px solid #334155;
    white-space: nowrap;
}
th { background: #1e293b; color: #38bdf8; }
</style>
</head>
<body>

<div class="header">
    <span>📊 Painel Gerencial</span>
    <a href="/index.html" class="btn-nav">Voltar ao App 📷</a>
</div>

<div class="container">
    <div class="card">
        <h2>Importar Planilha de Contratos</h2>
        
        <!-- Controle de Acesso -->
        <label>Chave de Acesso Gerencial</label>
        <input type="password" id="input-senha" placeholder="DIGITE A SENHA DE GERENTE">

        <!-- Selecionar Modo de Carga -->
        <label>Modo de Importação</label>
        <div class="radio-group">
            <label class="radio-option">
                <input type="radio" name="modo-carga" value="adicionar" checked>
                Anexar novos dados (Acumulativo)
            </label>
            <label class="radio-option">
                <input type="radio" name="modo-carga" value="substituir">
                Substituir tudo (Limpar fila e reescrever)
            </label>
        </div>

        <!-- Seletor do Arquivo CSV -->
        <label>Selecione a Planilha (.CSV)</label>
        <input type="file" id="input-csv" accept=".csv" style="padding: 10px 0;">

        <!-- Detalhes do arquivo processado -->
        <div id="info-carga" style="display:none; margin-top: 15px; font-size:13px; color:#22c55e; font-weight:bold;"></div>

        <!-- Pré-visualização da tabela -->
        <div id="preview-section" style="display: none;">
            <label>Pré-visualização dos dados lidos (Primeiras 5 linhas):</label>
            <div class="table-container">
                <table id="tabela-preview">
                    <thead>
                        <tr>
                            <th>RowKey</th>
                            <th>PartitionKey</th>
                            <th>Nome Titular</th>
                            <th>Endereço</th>
                            <th>Tipo Retirada</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <button id="btn-enviar" class="btn-primary" disabled>PROCESSAR E ENVIAR AO AZURE</button>
    </div>
</div>

<script>
let contratosProcessados = [];

// --- LEITURA E PARSE DO CSV PELO NAVEGADOR ---
document.getElementById('input-csv').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const dadosOriginal = results.data;
            contratosProcessados = [];

            dadosOriginal.forEach(row => {
                const mapeado = {
                    RowKey: row['RowKey'] ? row['RowKey'].trim() : '',
                    PartitionKey: row['PartitionKey'] ? row['PartitionKey'].trim().toUpperCase() : '',
                    tipo_retirada: row['tipo_retirada'] ? row['tipo_retirada'].trim().toUpperCase() : '',
                    mes_safra: row['mes_safra'] ? row['mes_safra'].trim() : '',
                    modelo_equipamento: row['modelo_equipamento'] ? row['modelo_equipamento'].trim().toUpperCase() : '',
                    quantidade_equipamentos: row['quantidade_equipamentos'] ? parseInt(row['quantidade_equipamentos']) || 1 : 1,
                    titular: row['Nome Titular (AP1)'] ? row['Nome Titular (AP1)'].trim().toUpperCase() : '',
                    tel_residencial: row['tel_residencial'] ? row['tel_residencial'].trim() : '',
                    tel_celular: row['tel_celular'] ? row['tel_celular'].trim() : '',
                    endereco: row['endereco'] ? row['endereco'].trim().toUpperCase() : '',
                    bairro: row['bairro'] ? row['bairro'].trim().toUpperCase() : '',
                    complemento: row['complemento'] ? row['complemento'].trim().toUpperCase() : ''
                };

                if (mapeado.RowKey && mapeado.PartitionKey) {
                    contratosProcessados.push(mapeado);
                }
            });

            const infoCarga = document.getElementById('info-carga');
            infoCarga.style.display = 'block';
            infoCarga.textContent = `✔ Planilha lida com sucesso! ${contratosProcessados.length} contratos válidos identificados.`;

            renderizarPreview();
            document.getElementById('btn-enviar').disabled = false;
        }
    });
});

function renderizarPreview() {
    const tbody = document.querySelector('#tabela-preview tbody');
    tbody.innerHTML = "";
    document.getElementById('preview-section').style.display = 'block';

    const primeirasLinhas = contratosProcessados.slice(0, 5);
    primeirasLinhas.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${item.RowKey}</td>
            <td>${item.PartitionKey}</td>
            <td>${item.titular || 'N/A'}</td>
            <td>${item.endereco || 'N/A'}</td>
            <td>${item.tipo_retirada || 'N/A'}</td>
        `;
        tbody.appendChild(tr);
    });
}

// --- SUBMISSÃO EM LOTES (PREVINE TIMEOUT E TRATA ERROS DE FORMA ROBUSTA) ---
document.getElementById('btn-enviar').addEventListener('click', async () => {
    const senha = document.getElementById('input-senha').value.trim();
    const modo = document.querySelector('input[name="modo-carga"]:checked').value;
    const btnEnviar = document.getElementById('btn-enviar');

    if (!senha) {
        alert("Digite a senha de acesso gerencial.");
        return;
    }

    if (contratosProcessados.length === 0) {
        alert("Por favor, carregue um arquivo CSV válido primeiro.");
        return;
    }

    if (modo === 'substituir') {
        const confirma = confirm("⚠️ ATENÇÃO: Esta ação apagará TODOS os contratos atuais da base do Azure para gravar a nova lista. Deseja prosseguir?");
        if (!confirma) return;
    }

    btnEnviar.disabled = true;

    // Tamanho seguro do lote para envio (100 contratos por requisição)
    const tamanhoLote = 100;
    const totalContratos = contratosProcessados.length;
    let enviados = 0;

    // Se "substituir", apenas o primeiro lote apaga o banco. Os lotes seguintes apenas adicionam.
    let acaoAtual = modo; 

    for (let i = 0; i < totalContratos; i += tamanhoLote) {
        const lote = contratosProcessados.slice(i, i + tamanhoLote);
        
        // Atualiza a barra de progresso visual no botão
        const progresso = Math.round((enviados / totalContratos) * 100);
        btnEnviar.textContent = `ENVIANDO: ${enviados} de ${totalContratos} (${progresso}%)...`;

        const payload = {
            senha: senha,
            acao: acaoAtual,
            contratos: lote
        };

        try {
            const response = await fetch('/api/importarContratos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // TRATAMENTO DE ERROS EM LOTES DE FORMA ROBUSTA:
            if (!response.ok) {
                let mensagemErroServidor = "";
                try {
                    const textoPuro = await response.text();
                    try {
                        const jsonErro = JSON.parse(textoPuro);
                        mensagemErroServidor = jsonErro.error || textoPuro;
                    } catch (e) {
                        mensagemErroServidor = textoPuro || `Código de status: ${response.status}`;
                    }
                } catch (e) {
                    mensagemErroServidor = `Falha de rede com status ${response.status}`;
                }
                throw new Error(mensagemErroServidor);
            }

            enviados += lote.length;
            acaoAtual = 'adicionar';

        } catch (err) {
            console.error(err);
            alert(`Falha no envio do lote a partir da linha ${enviados}.\n\nDetalhes do Erro: ${err.message}`);
            btnEnviar.disabled = false;
            btnEnviar.textContent = "PROCESSAR E ENVIAR AO AZURE";
            return;
        }
    }

    // Sucesso absoluto após todos os lotes finalizados
    btnEnviar.disabled = false;
    btnEnviar.textContent = "PROCESSAR E ENVIAR AO AZURE";
    alert(`Sucesso! Todos os ${totalContratos} contratos foram carregados com êxito na nuvem.`);
    
    // Limpa os campos após sucesso
    document.getElementById('input-csv').value = "";
    document.getElementById('input-senha').value = "";
    document.getElementById('info-carga').style.display = 'none';
    document.getElementById('preview-section').style.display = 'none';
    contratosProcessados = [];
});
</script>
</body>
</html>
